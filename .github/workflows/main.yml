name: Publish rtn-pubstar to npmjs

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'RTNPubstar/package.json'

permissions:
  contents: write

jobs:
  publish:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: ./RTNPubstar

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from package.json
        id: pkg
        run: |
          EXTRACTED_VERSION=$(jq -r .version package.json)

          if [ -z "$EXTRACTED_VERSION" ] || [ "$EXTRACTED_VERSION" = "null" ]; then
            echo "❌ RTNPubstar/package.json missing version"
            exit 1
          fi

          echo "version=$EXTRACTED_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$EXTRACTED_VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $EXTRACTED_VERSION (tag v$EXTRACTED_VERSION)"

      - name: Check if Tag exists
        id: check_tag
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_SDK_IOS }}
        run: |
          TAG_NAME="${{ steps.pkg.outputs.tag }}"
          REMOTE_REPO="pubstar-io/react-native-sdk"

          echo "Checking tag $TAG_NAME on $REMOTE_REPO..."

          if gh api repos/$REMOTE_REPO/git/ref/tags/$TAG_NAME >/dev/null 2>&1; then
            echo "Tag $TAG_NAME already exists. Skipping publish to avoid error."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "Tag $TAG_NAME does not exist."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.check_tag.outputs.exists == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        if: steps.check_tag.outputs.exists == 'false'
        run: yarn install --frozen-lockfile

      - name: Zip project source code using git
        id: zip_step
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          ZIP_NAME="react-native-sdk-${{ steps.pkg.outputs.version }}.zip"
          git archive -o "$GITHUB_WORKSPACE/$ZIP_NAME" HEAD
          echo "zip_file=$ZIP_NAME" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release and upload asset
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          repository: pubstar-io/react-native-sdk
          tag_name: ${{ steps.pkg.outputs.tag }}
          target_commitish: main
          name: ${{ steps.pkg.outputs.version }}
          generate_release_notes: true
          files: |
            ${{ steps.zip_step.outputs.zip_file }}
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_SDK_IOS }}

      - name: Publish to NPM
        if: steps.check_tag.outputs.exists == 'false'
        # --tag latest is required: npm refuses to publish a prerelease
        # version (e.g. 1.6.0-1) without an explicit tag, and "latest" is
        # what makes the npm package page show this version's README.
        run: npm publish --access public --tag latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
